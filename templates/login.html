{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitMitra - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
        }
        .login-card { 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            border: none; 
            overflow: hidden; 
            max-width: 900px; 
            width: 100%; 
            background: white;
        }
        .left-side { 
            background-color: #eef2ff; /* Light purple theme */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 3rem; 
        }
        .right-side { 
            padding: 3.5rem; 
            background: white; 
        }
        .btn-custom { 
            background-color: #000; 
            color: white; 
            border-radius: 30px; 
            padding: 12px; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .btn-custom:hover { 
            background-color: #333; 
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }
        .logo-text {
            color: #4f46e5;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="container px-4">
        <div class="card login-card row flex-row mx-auto shadow-lg">
            
            <div class="col-md-6 left-side d-none d-md-flex text-center">
                <h1 style="font-size: 7rem; margin-bottom: 20px;">🤝</h1>
                <h2 class="fw-bold">SplitMitra</h2>
                <p class="text-muted">Smart way to split, easier way to pay.</p>
            </div>

            <div class="col-md-6 right-side">
                <div class="mb-4">
                    <h2 class="fw-bold mb-1">Login</h2>
                    <p class="text-muted">Welcome back to <span class="logo-text">SplitMitra!</span></p>
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2 small mb-3 border-0" style="border-radius: 10px;">
                        <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="gaurav@example.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 mb-4 shadow-sm">
                        Verify & Login
                    </button>
                </form>

                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account?</p>
                    <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none small">Register here</a>
                </div>

                <div class="text-center mt-5">
                    <small class="text-muted" style="font-size: 0.75rem;">Made with ❤️ in India</small>
                </div>
            </div>
            
        </div>
    </div>

</body>
</html>
