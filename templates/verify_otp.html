<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Splitkaro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
        }
        .verify-card { 
            border-radius: 20px; 
            padding: 3rem; 
            max-width: 450px; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: none; 
            background: white;
            text-align: center;
        }
        .btn-custom { 
            background-color: #000; 
            color: white; 
            border-radius: 30px; 
            padding: 12px; 
            font-weight: 500; 
        }
        .btn-custom:hover { 
            background-color: #333; 
            color: white; 
        }
        /* OTP Input field ka design */
        .otp-input {
            letter-spacing: 12px;
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 12px;
            border: 1px solid #eaeaea;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="card verify-card">
        <div class="text-start mb-4">
            <a href="{% url 'login' %}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Edit number?</a>
        </div>

        <h3 class="fw-bold mb-3">Verify your number</h3>
        
        <p class="text-muted mb-4 small">
            An OTP has been sent to your terminal for <br>
            <strong class="text-dark">{{ request.session.phone }}</strong>
        </p>
        
        {% if error %}
            <div class="alert alert-danger py-2 small fw-medium">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'verify_otp' %}">
            {% csrf_token %}
            <input type="text" name="otp" class="form-control otp-input mb-4 shadow-sm bg-light" placeholder="------" maxlength="6" required autocomplete="off">
            
            <button type="submit" class="btn btn-custom w-100 shadow-sm">Verify & Login</button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">Made with ❤️ in India</small>
        </div>
    </div>

</body>
</html>
