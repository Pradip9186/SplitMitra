{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Link Generated - SplitMitra Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #10b981, #059669); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .premium-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .success-icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .link-box {
            background: #f0fdf4;
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            word-break: break-all;
        }
        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
        .premium-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px 40px;
            font-weight: 700;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <div class="success-icon">✅</div>
        <h2 class="mb-2 fw-800" style="letter-spacing: -0.5px; color: #1e1e2f;">Invite Link Created!</h2>
        <p class="text-muted mb-4">
            Share this link with others to invite them to "{{ group.name }}"
        </p>

        <div class="link-box">
            <code id="inviteUrl" style="font-size: 14px; font-weight: 600;">{{ invite_url }}</code>
        </div>

        <button class="copy-btn" onclick="copyToClipboard()">
            <i class="bi bi-clipboard me-2"></i> Copy Link
        </button>

        <p class="text-muted mt-3 small">
            <strong>Max Uses:</strong> {% if invite.max_uses > 0 %}{{ invite.max_uses }}{% else %}Unlimited{% endif %}
        </p>

        <a href="{% url 'group_detail' group.id %}" class="premium-btn">
            <i class="bi bi-check-circle me-2"></i> Done
        </a>
    </div>

    <script>
        function copyToClipboard() {
            const url = document.getElementById('inviteUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
