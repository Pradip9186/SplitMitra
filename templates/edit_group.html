{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Group - SplitMitra Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .premium-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        .premium-input {
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .premium-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .premium-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px 40px;
            font-weight: 700;
            transition: all 0.3s;
            width: 100%;
        }
        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-cancel {
            background: #e2e8f0;
            color: #1e1e2f;
            border: none;
            border-radius: 16px;
            padding: 14px 40px;
            font-weight: 700;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .btn-cancel:hover {
            background: #cbd5e1;
            color: #1e1e2f;
        }
        .select-input {
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 20px;
            width: 100%;
        }
        .select-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <h2 class="mb-1 fw-800" style="letter-spacing: -0.5px; color: #1e1e2f;">
            <i class="bi bi-pencil-square"></i> Edit Group
        </h2>
        <p class="text-muted mb-4">Update your group details</p>

        <form method="POST">
            {% csrf_token %}
            
            <label class="fw-700 mb-2 d-block" style="color: #1e1e2f;">Group Name</label>
            <input type="text" name="name" class="premium-input" placeholder="Enter new group name" value="{{ group.name }}" required>
            
            <label class="fw-700 mb-2 d-block" style="color: #1e1e2f;">Description (Optional)</label>
            <textarea name="description" class="premium-input" placeholder="What is this group about?" style="height: 100px; resize: none;">{{ group.description }}</textarea>
            
            <label class="fw-700 mb-2 d-block" style="color: #1e1e2f;">Category</label>
            <select name="category" class="select-input" required>
                <option value="home" {% if group.category == 'home' %}selected{% endif %}>🏠 Home</option>
                <option value="trip" {% if group.category == 'trip' %}selected{% endif %}>✈️ Trip</option>
                <option value="couple" {% if group.category == 'couple' %}selected{% endif %}>👩‍❤️‍👨 Couple</option>
                <option value="personal" {% if group.category == 'personal' %}selected{% endif %}>👤 Personal</option>
                <option value="business" {% if group.category == 'business' %}selected{% endif %}>💼 Business</option>
                <option value="office" {% if group.category == 'office' %}selected{% endif %}>🏢 Office</option>
                <option value="sports" {% if group.category == 'sports' %}selected{% endif %}>⚽ Sports</option>
                <option value="others" {% if group.category == 'others' %}selected{% endif %}>🎟️ Others</option>
            </select>

            <button type="submit" class="premium-btn">
                <i class="bi bi-check-circle me-2"></i> Update Group
            </button>
            <a href="{% url 'group_detail' group.id %}" class="btn btn-cancel">Cancel</a>
        </form>

        {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
