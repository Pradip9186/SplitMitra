{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitMitra - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
        }
        .register-card { 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            border: none; 
            overflow: hidden; 
            max-width: 900px; 
            width: 100%; 
            background: white;
        }
        .left-side { 
            background-color: #eef2ff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 3rem; 
        }
        .right-side { 
            padding: 3rem; 
            background: white; 
        }
        .btn-custom { 
            background-color: #000; 
            color: white; 
            border-radius: 30px; 
            padding: 12px; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .btn-custom:hover { 
            background-color: #333; 
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #4f46e5;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container px-4">
        <div class="card register-card row flex-row mx-auto shadow-lg">
            
            <div class="col-md-5 left-side d-none d-md-flex text-center">
                <h1 style="font-size: 6rem; margin-bottom: 20px;">🎉</h1>
                <h2 class="fw-bold">Join SplitMitra</h2>
                <p class="text-muted">Start managing your group expenses like a pro.</p>
            </div>

            <div class="col-md-7 right-side">
                <div class="mb-4">
                    <h2 class="fw-bold mb-1">Registration</h2>
                    <p class="text-muted small">Create your account for <b>SplitMitra</b></p>
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2 small mb-3 border-0" style="border-radius: 10px;">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label text-muted small fw-bold">First Name</label>
                            <input type="text" name="first_name" class="form-control" placeholder="Gaurav" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="gaurav@gmail.com" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Create Password</label>
                            <input type="password" name="pass1" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small fw-bold">Confirm Password</label>
                            <input type="password" name="pass2" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 mb-3 shadow-sm">
                        Register & Login
                    </button>
                </form>

                <div class="text-center">
                    <p class="small text-muted mb-0">Already have an account?</p>
                    <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none small">Login here</a>
                </div>
            </div>
            
        </div>
    </div>

</body>
</html>
