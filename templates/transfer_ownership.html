{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ownership - SplitMitra Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .premium-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        .member-item {
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .member-item:hover {
            border-color: #667eea;
            background: white;
            transform: translateX(4px);
        }
        .member-item input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
        }
        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
        }
        .premium-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px 40px;
            font-weight: 700;
            transition: all 0.3s;
            width: 100%;
        }
        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <h2 class="mb-1 fw-800" style="letter-spacing: -0.5px; color: #1e1e2f;">
            <i class="bi bi-arrow-left-right"></i> Transfer Ownership
        </h2>
        <p class="text-muted mb-4">Select a member to make them the new admin of "{{ group.name }}"</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="members-list mb-4">
                {% for member in members %}
                <label class="member-item">
                    <input type="radio" name="new_admin_id" value="{{ member.id }}" required>
                    <div class="member-avatar">{{ member.first_name|first|upper }}</div>
                    <div>
                        <div class="fw-700" style="color: #1e1e2f;">{{ member.first_name or member.username }}</div>
                        <div class="small text-muted">{{ member.email }}</div>
                    </div>
                </label>
                {% endfor %}
            </div>

            <button type="submit" class="premium-btn">
                <i class="bi bi-check-circle me-2"></i> Transfer Ownership
            </button>
            <a href="{% url 'group_detail' group.id %}" class="btn btn-secondary w-100 mt-2" style="border-radius: 16px;">Cancel</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
